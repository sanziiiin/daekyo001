                      <>
                        <Btn label="이어쓰기" onClick={() => goWrite(item, false)} variant="secondary" style={{ flex: 1 }} />
                        <Btn label="제출하기" onClick={() => goWrite(item, false)} variant="primary" style={{ flex: 1 }} />
                      </>
                    )}
                    {item.status === "done" && (
                      <>
                        {!item.modifyUsed && <Btn label="고쳐쓰기" onClick={() => goWrite(item, true)} variant="secondary" style={{ flex: 1 }} />}
                        <Btn label="결과서 보기" onClick={() => { setResultId(item.id); setResultTab("original"); setPage("result"); }} variant="primary" style={{ flex: 1 }} />
                      </>
                    )}
                  </div>
                </div>
              ))
            )}
          </div>
        </div>
      );

      // ── WRITE ──
      if (page === "write") return (
        <div style={{ background: "#F9FAFB", minHeight: "100vh", padding: "20px" }}>
          {toast && <Toast msg={toast} />}
          {modal?.type === "leave" && <ConfirmModal title="저장되지 않은 내용이 있어요" msg="저장하지 않고 나가면 변경사항이 사라집니다." confirmLabel="나가기" confirmColor="#EF4444" onConfirm={confirmLeave} onCancel={() => setModal(null)} />}
          {showImageModal && <ImageModal src={image} onClose={() => setShowImageModal(false)} />}
          <div style={{ maxWidth: 768, margin: "0 auto" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
              <button onClick={tryLeave} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 20, color: D3, padding: 0 }}>←</button>
              <div style={{ flex: 1 }}>
                <h1 style={{ fontSize: 20, fontWeight: 700, color: D, margin: 0 }}>{isRewrite ? "고쳐쓰기" : "과제 작성하기"}</h1>
                <div style={{ display: "flex", gap: 5, marginTop: 6, flexWrap: "wrap" }}>
                  {[editItem.publisher, editItem.grade, editItem.unit].map(v => <span key={v} style={{ fontSize: 11, background: B, color: D3, padding: "2px 9px", borderRadius: 20, fontWeight: 500 }}>{v}</span>)}
                </div>
              </div>
            </div>
            <div style={{ background: "#fff", borderRadius: 12, padding: "14px 16px", marginBottom: 16, boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
              <p style={{ fontSize: 16, fontWeight: 700, color: D, margin: 0, lineHeight: 1.5 }}>{editItem.title}</p>
            </div>
            <TaskGuide rubricType={editItem.rubricType} />
            <div style={{ background: "#fff", borderRadius: 12, padding: 16, boxShadow: "0 1px 4px rgba(0,0,0,0.06)", marginBottom: 16 }}>
              <p style={{ fontSize: 13, fontWeight: 600, color: D2, margin: "0 0 10px" }}>📷 글쓰기 촬영</p>
              <div style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
                <div style={{ position: "relative", flexShrink: 0 }}>
                  <button onClick={() => setShowCam(v => !v)} style={{ width: 72, height: 72, borderRadius: 12, border: "2px dashed #D1D5DB", background: "#F9FAFB", cursor: "pointer", fontSize: 26, display: "flex", alignItems: "center", justifyContent: "center" }}>📷</button>
                  {showCam && (
                    <div style={{ position: "absolute", top: 78, left: 0, zIndex: 10, background: "#fff", border: "1px solid #E5E7EB", borderRadius: 10, boxShadow: "0 4px 16px rgba(0,0,0,0.12)", overflow: "hidden", minWidth: 150 }}>
                      <button onClick={() => { fileRef.current.setAttribute("capture", "environment"); fileRef.current.click(); setShowCam(false); }} style={{ display: "block", width: "100%", padding: "12px 16px", background: "none", border: "none", textAlign: "left", fontSize: 14, cursor: "pointer", color: D }}>📸 촬영하기</button>
                      <div style={{ height: 1, background: B }} />
                      <button onClick={() => { fileRef.current.removeAttribute("capture"); fileRef.current.click(); setShowCam(false); }} style={{ display: "block", width: "100%", padding: "12px 16px", background: "none", border: "none", textAlign: "left", fontSize: 14, cursor: "pointer", color: D }}>🖼️ 이미지 선택</button>
                    </div>
                  )}
                  <input ref={fileRef} type="file" accept="image/*" style={{ display: "none" }} onChange={e => handleFile(e.target.files[0])} />
                </div>
                {image ? (
                  <div style={{ position: "relative", width: 72, height: 72, flexShrink: 0 }}>
                    <div onClick={() => setShowImageModal(true)} style={{ width: 72, height: 72, borderRadius: 12, background: "#E8F0FE", border: "2px solid #C7D7FB", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer" }}>
                      <svg viewBox="0 0 72 72" style={{ width: 72, height: 72, borderRadius: 10 }}><rect width="72" height="72" fill="#E8F0FE" rx="10" /><rect x="8" y="8" width="56" height="56" rx="6" fill="#C7D7FB" /><circle cx="26" cy="28" r="7" fill="#93B4F8" /><polygon points="8,64 28,38 42,52 54,36 64,64" fill="#6B9CF6" /></svg>
                    </div>
                    <button onClick={() => { setImage(null); setIsDirty(true); }} style={{ position: "absolute", top: -6, right: -6, width: 20, height: 20, borderRadius: "50%", background: "#EF4444", border: "none", color: "#fff", fontSize: 10, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>✕</button>
                  </div>
                ) : (
                  <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", height: 72, borderRadius: 10, background: B }}>
                    <span style={{ fontSize: 13, color: "#9CA3AF" }}>이미지를 선택해주세요</span>
                  </div>
                )}
              </div>
              {image && <p style={{ fontSize: 11, color: "#3B82F6", margin: "8px 0 0", textAlign: "center" }}>💡 이미지를 클릭하면 확대해서 볼 수 있습니다</p>}
            </div>
            <div style={{ background: "#fff", borderRadius: 12, padding: 16, boxShadow: "0 1px 4px rgba(0,0,0,0.06)", marginBottom: 16 }}>
              <p style={{ fontSize: 13, fontWeight: 600, color: D2, margin: "0 0 12px" }}>🎨 편집 옵션</p>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
                <div>
                  <label style={{ display: "block", fontSize: 11, color: D3, marginBottom: 4, fontWeight: 500 }}>배경색</label>
                  <input type="color" value={bgColor} onChange={e => { setBgColor(e.target.value); setIsDirty(true); }} style={{ width: "100%", height: 36, border: "1.5px solid #E5E7EB", borderRadius: 8, cursor: "pointer" }} />
                </div>
                <div>
                  <label style={{ display: "block", fontSize: 11, color: D3, marginBottom: 4, fontWeight: 500 }}>서체</label>
                  <select value={fontFamily} onChange={e => { setFontFamily(e.target.value); setIsDirty(true); }} style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: "1.5px solid #E5E7EB", fontSize: 12, color: D, background: "#fff", cursor: "pointer" }}>
                    <option value="inherit">기본체</option>
                    <option value="serif">명조체</option>
                    <option value="sans-serif">고딕체</option>
                    <option value="monospace">모노스페이스</option>
                  </select>
                </div>
                <div>
                  <label style={{ display: "block", fontSize: 11, color: D3, marginBottom: 4, fontWeight: 500 }}>글씨 크기</label>
                  <select value={fontSize} onChange={e => { setFontSize(Number(e.target.value)); setIsDirty(true); }} style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: "1.5px solid #E5E7EB", fontSize: 12, color: D, background: "#fff", cursor: "pointer" }}>
                    <option value="12">작게 (12px)</option>
                    <option value="14">보통 (14px)</option>
                    <option value="16">크게 (16px)</option>
                    <option value="18">아주 크게 (18px)</option>
                  </select>
                </div>
              </div>
            </div>
            <div style={{ background: "#fff", borderRadius: 12, padding: 16, boxShadow: "0 1px 4px rgba(0,0,0,0.06)", marginBottom: 16 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                <p style={{ fontSize: 13, fontWeight: 600, color: D2, margin: 0 }}>📝 제목</p>
                <span style={{ fontSize: 11, color: title.length > 50 ? "#EF4444" : "#9CA3AF" }}>{title.length}/50자</span>
              </div>
              <input type="text" value={title} onChange={e => { if (e.target.value.length <= 50) { setTitle(e.target.value); setIsDirty(true); } }} placeholder="과제 제목을 입력하세요 (최대 50자)" style={{ width: "100%", padding: 12, borderRadius: 8, border: "1.5px solid #E5E7EB", fontSize: fontSize, fontFamily: fontFamily, background: bgColor, color: D2, boxSizing: "border-box", outline: "none" }} />
            </div>
            <div style={{ background: "#fff", borderRadius: 12, padding: 16, boxShadow: "0 1px 4px rgba(0,0,0,0.06)", marginBottom: 16 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                <p style={{ fontSize: 13, fontWeight: 600, color: D2, margin: 0 }}>✍️ 본문</p>
                <span style={{ fontSize: 11, color: ocrText.length > 10000 ? "#EF4444" : "#9CA3AF" }}>{ocrText.length}/10,000자</span>
              </div>
              {ocrLoading ? (
                <div style={{ display: "flex", gap: 6, padding: "40px 0", justifyContent: "center" }}>
                  {[0, 1, 2].map(i => <div key={i} style={{ width: 8, height: 8, borderRadius: "50%", background: "#3B82F6", animation: "bounce 1s infinite", animationDelay: `${i * 0.2}s` }} />)}
                </div>
              ) : (
                <textarea value={ocrText} onChange={e => { if (e.target.value.length <= 10000) { setOcrText(e.target.value); setIsDirty(true); } }} rows={12} placeholder="본문 내용을 입력하거나 위의 촬영 버튼으로 손글씨를 업로드하세요 (최대 10,000자)" style={{ width: "100%", padding: 12, borderRadius: 8, border: "1.5px solid #E5E7EB", fontSize: fontSize, fontFamily: fontFamily, background: bgColor, color: D2, lineHeight: 1.8, resize: "vertical", boxSizing: "border-box", outline: "none" }} />
              )}
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              {isRewrite ? (
                <button disabled={!canSubmit} onClick={handleSubmit} style={{ flex: 1, padding: "14px", borderRadius: 12, border: "none", background: canSubmit ? "#2563EB" : "#E5E7EB", color: canSubmit ? "#fff" : "#9CA3AF", fontSize: 16, fontWeight: 700, cursor: canSubmit ? "pointer" : "not-allowed" }}>고쳐쓰기 제출</button>
              ) : (
                <>
                  <button disabled={!canSubmit} onClick={handleSave} style={{ flex: 1, padding: "14px", borderRadius: 12, border: canSubmit ? "1.5px solid #2563EB" : "1.5px solid #E5E7EB", background: "#fff", color: canSubmit ? "#2563EB" : "#9CA3AF", fontSize: 16, fontWeight: 700, cursor: canSubmit ? "pointer" : "not-allowed" }}>저장하기</button>
                  <button disabled={!canSubmit} onClick={handleSubmit} style={{ flex: 1, padding: "14px", borderRadius: 12, border: "none", background: canSubmit ? "#2563EB" : "#E5E7EB", color: canSubmit ? "#fff" : "#9CA3AF", fontSize: 16, fontWeight: 700, cursor: canSubmit ? "pointer" : "not-allowed" }}>제출하기</button>
                </>
              )}
            </div>
          </div>
          <style>{`@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}`}</style>
        </div>
      );

      // ── RESULT ──
      if (page === "result") {
        return (
          <div style={{ background: "#F9FAFB", minHeight: "100vh", padding: "20px" }}>
            <div style={{ maxWidth: 768, margin: "0 auto" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
                <button onClick={() => setPage("home")} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 20, color: D3, padding: 0 }}>←</button>
                <h1 style={{ fontSize: 20, fontWeight: 700, color: D, margin: 0 }}>결과서</h1>
              </div>
              {showVersionTabs && (
                <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
                  <button onClick={() => setResultTab("original")} style={{ flex: 1, padding: "10px", borderRadius: 10, border: "none", background: resultTab === "original" ? "#2563EB" : "#fff", color: resultTab === "original" ? "#fff" : D3, fontSize: 14, fontWeight: 600, cursor: "pointer" }}>1차 결과서</button>
                  <button onClick={() => setResultTab("rewrite")} style={{ flex: 1, padding: "10px", borderRadius: 10, border: "none", background: resultTab === "rewrite" ? "#2563EB" : "#fff", color: resultTab === "rewrite" ? "#fff" : D3, fontSize: 14, fontWeight: 600, cursor: "pointer" }}>고쳐쓰기 결과서</button>
                </div>
              )}
              <div style={{ background: "#fff", borderRadius: 12, padding: 20, boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
                <div style={{ textAlign: "center", padding: "40px 20px" }}>
                  <div style={{ width: 120, height: 120, borderRadius: "50%", background: "#EFF6FF", margin: "0 auto 20px", display: "flex", alignItems: "center", justifyContent: "center" }}>
                    <span style={{ fontSize: 48, fontWeight: 800, color: "#2563EB" }}>72</span>
                  </div>
                  <p style={{ fontSize: 18, fontWeight: 700, color: D, margin: "0 0 8px" }}>평가가 완료되었습니다</p>
                  <p style={{ fontSize: 14, color: D3, margin: 0 }}>상세한 분석 결과를 확인하세요</p>
                </div>
              </div>
            </div>
          </div>
        );
      }

      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
