                    <span style={{ color: "#6B7280", minWidth: 90, fontSize: 12 }}>학생명</span>

                        연과 행의 구조를 갖추어 시의 형식을 잘 따랐습니다.
                      </p>
                      <p style={{ fontSize: 12, color: "#111827", fontWeight: 700, margin: "0 0 8px" }}>💡 개선 방법</p>
                      <p style={{ fontSize: 12, color: "#4B5563", lineHeight: 1.8, margin: 0 }}>
                        각 연이 의미적으로도 구분되도록 내용을 조금 더 정리하면 좋겠습니다.
                      </p>
                    </div>
                  </div>
                </div>
              </div>

              {/* 마지막 안내 */}
              <div style={{ background: "linear-gradient(135deg, #EFF6FF 0%, #DBEAFE 100%)", border: "1px solid #BFDBFE", borderRadius: 12, padding: 18, marginBottom: 24 }}>
                <div style={{ display: "flex", alignItems: "flex-start", gap: 10 }}>
                  <span style={{ fontSize: 20 }}>💡</span>
                  <div>
                    <h4 style={{ fontSize: 13, fontWeight: 800, color: "#1E40AF", margin: "0 0 8px" }}>빛 따뜻함 희망 나 이를 토대로 예시</h4>
                    <p style={{ fontSize: 12, color: "#1E40AF", lineHeight: 1.8, margin: 0 }}>
                      "나는 겨울 아침의 햇살이다. 차가운 창문을 녹이고, 얼어붙은 마음도 따뜻하게 녹인다. 어둠 속에서도 길을 찾게 하는 빛이다."
                    </p>
                  </div>
                </div>
              </div>

              <button onClick={() => setPage("home")} style={{ width: "100%", padding: "14px", borderRadius: 10, border: "2px solid #3B82F6", background: "#fff", color: "#3B82F6", fontSize: 15, fontWeight: 700, cursor: "pointer", transition: "all 0.2s" }} onMouseEnter={e => { e.target.style.background = "#3B82F6"; e.target.style.color = "#fff"; }} onMouseLeave={e => { e.target.style.background = "#fff"; e.target.style.color = "#3B82F6"; }}>← 목록으로 돌아가기</button>
            </div>
          </div>
        );
      }

      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
