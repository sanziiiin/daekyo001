    h("div",{style:{position:"relative",width:size,height:size}},
      h("svg",{width:size,height:size,style:{transform:"rotate(-90deg)"}},

        h("circle",{cx:size/2,cy:size/2,r,fill:"none",stroke:D,strokeWidth:"7",strokeDasharray:`${dash} ${circ}`,strokeLinecap:"round"})

      h("div",{style:{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}},
        h("span",{style:{fontSize:20,fontWeight:700,color:D,lineHeight:1}},score),

  const handleSave=()=>{setList(prev=>prev.map(r=>r.id===editId?{...r,ocrText,image,status:"writing"}:r));setIsDirty(false);showToast("저장 되었습니다.");setTimeout(()=>setPage("home"),1800);};
  const handleSubmit=()=>{
    if(isRewrite){setList(prev=>prev.map(r=>r.id===editId?{...r,ocrText,image,status:"done",modifiedAt:nowStr(),modifyUsed:true,prevScore:r.score,score:"85점"}:r));}
    else{setList(prev=>prev.map(r=>r.id===editId?{...r,ocrText,image,status:"submitted",submitAt:r.submitAt||nowStr()}:r));}
    setIsDirty(false);showToast(isRewrite?"고쳐쓰기가 완료되었습니다.":"제출 되었습니다.");setTimeout(()=>setPage("home"),1800);
  };
  const handleFile=file=>{if(!file)return;setImage(URL.createObjectURL(file));setOcrText("");setShowCam(false);setOcrLoading(true);setIsDirty(true);setTimeout(()=>{setOcrLoading(false);setOcrText(OCR_DUMMY);},2000);};
  const canSubmit=ocrText.length>0;
  const hasFilter=fGrade||fSubject||fPeriod||fStatus;
  const filtered=list.filter(r=>(!fGrade||r.grade===fGrade)&&(!fSubject||r.subject===fSubject)&&(!fPeriod||r.period===fPeriod)&&(!fStatus||r.status===fStatus)&&(!onlyDone||r.status==="done"));
  const editItem=list.find(r=>r.id===editId)||list[1];
  const resultItem=list.find(r=>r.id===resultId)||list.find(r=>r.status==="done")||list[0];
  const showVersionTabs=resultItem&&resultItem.modifyUsed&&resultItem.prevScore;

  // ── HOME ──
  if(page==="home") return h("div",{style:{background:"#F9FAFB",minHeight:"100vh",padding:"20px"}},
    toast&&h(Toast,{msg:toast}),
    h("div",{style:{maxWidth:768,margin:"0 auto",display:"flex",flexDirection:"column",gap:16}},
      h("div",null,
        h("h1",{style:{fontSize:22,fontWeight:700,color:D,margin:0}},"수행평가"),
        h("p",{style:{fontSize:13,color:"#9CA3AF",margin:"4px 0 0"}},"과제 목록을 확인하세요")
      ),
      // 필터
      h("div",{style:{background:"#fff",borderRadius:12,padding:16,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}},
        h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}},
          h("p",{style:{fontSize:13,fontWeight:600,color:D2,margin:0}},"필터"),
          h("div",{style:{display:"flex",alignItems:"center",gap:14}},
            h("div",{style:{display:"flex",alignItems:"center",gap:6,cursor:"pointer"},onClick:()=>setOnlyDone(v=>!v)},
              h("div",{style:{width:18,height:18,borderRadius:4,border:onlyDone?"none":"1.5px solid #D1D5DB",background:onlyDone?"#10B981":"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}},
                onlyDone&&h("svg",{width:"11",height:"9",viewBox:"0 0 11 9",fill:"none"},h("path",{d:"M1 4L4 7.5L10 1",stroke:"#fff",strokeWidth:"1.8",strokeLinecap:"round",strokeLinejoin:"round"}))
              ),
              h("span",{style:{fontSize:13,fontWeight:onlyDone?600:400,color:onlyDone?"#10B981":D3}},"결과서 보기")
            ),
            h("button",{onClick:()=>{setFGrade("");setFSubject("");setFPeriod("");setFStatus("");setOnlyDone(false);},style:{fontSize:12,color:(hasFilter||onlyDone)?"#2563EB":"#9CA3AF",background:"none",border:"none",cursor:"pointer",fontWeight:600,padding:0}},"초기화")
          )
        ),
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}},
          h(Sel,{label:"과제 기간",value:fPeriod,onChange:v=>{setFPeriod(v);setOnlyDone(false);},options:PERIODS,placeholder:"전체 기간"}),
          h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,gridColumn:"1/-1"}},
            h(Sel,{label:"학년",value:fGrade,onChange:v=>{setFGrade(v);setOnlyDone(false);},options:GRADES,placeholder:"전체 학년"}),
            h(Sel,{label:"과목",value:fSubject,onChange:v=>{setFSubject(v);setOnlyDone(false);},options:SUBJECTS,placeholder:"전체 과목"}),
            h(Sel,{label:"제출 상태",value:fStatus,onChange:v=>{setFStatus(v);setOnlyDone(false);},options:[{v:"draft",l:"제출 전"},{v:"writing",l:"작성 중"},{v:"submitted",l:"제출 완료"},{v:"evaluating",l:"평가 중"},{v:"done",l:"평가 완료"}],placeholder:"전체 상태",labelKey:"l",valueKey:"v"})
          )
        )
      ),
      // 목록
      h("div",{style:{display:"flex",flexDirection:"column",gap:10}},
        filtered.map(r=>h("div",{key:r.id,style:{background:"#fff",borderRadius:12,padding:16,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}},
          h("div",{style:{display:"flex",alignItems:"center",gap:5,marginBottom:8,flexWrap:"wrap"}},
            [r.grade,r.subject,r.hour].map(v=>h("span",{key:v,style:{fontSize:11,background:B,color:D3,padding:"2px 8px",borderRadius:20}},v)),
            h("div",{style:{marginLeft:"auto"}},h(StatusBadge,{item:r}))
          ),
          h("div",{style:{display:"flex",alignItems:"center",gap:10}},
            h("p",{style:{flex:1,fontSize:14,fontWeight:600,color:D,margin:0,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},r.title),
            h("div",{style:{flexShrink:0,display:"flex",flexDirection:"column",gap:1,alignItems:"flex-end"}},
              h("span",{style:{fontSize:11,color:"#9CA3AF",whiteSpace:"nowrap"}},"제출일 ",h("b",{style:{color:D3}},r.submitAt||"-")),
              r.modifyUsed&&r.modifiedAt&&h("span",{style:{fontSize:11,color:"#9CA3AF",whiteSpace:"nowrap"}},"수정일 ",h("b",{style:{color:"#F59E0B"}},r.modifiedAt)),
              h("span",{style:{fontSize:11,color:"#9CA3AF",whiteSpace:"nowrap"}},"평가일 ",h("b",{style:{color:D3}},r.evalAt||"-"))
            ),
            h("div",{style:{flexShrink:0,display:"flex",gap:6,flexWrap:"wrap",justifyContent:"flex-end"}},
              (r.status==="draft"||r.status==="writing")&&h(Btn,{label:"작성하기",onClick:()=>goWrite(r,false)}),
              r.status==="submitted"&&h("span",{style:{fontSize:12,color:"#9CA3AF",padding:"8px 4px"}},"평가 대기 중"),
              r.status==="evaluating"&&h("span",{style:{fontSize:12,color:"#8B5CF6",padding:"8px 4px",fontWeight:600}},"평가 중"),
              r.status==="done"&&!r.modifyUsed&&h(Btn,{label:"고쳐쓰기",onClick:()=>goWrite(r,true),color:"#F59E0B"}),
              r.status==="done"&&!r.modifyUsed&&h(Btn,{label:"결과서 보기",onClick:()=>goResult(r),color:"#10B981"}),
              r.status==="done"&&r.modifyUsed&&h(Fragment,null,
                h(Btn,{label:"1차 결과서",onClick:()=>goResult(r,"original"),color:"#6B7280",small:true}),
                h(Btn,{label:"고쳐쓰기 결과서",onClick:()=>goResult(r,"rewrite"),color:"#10B981",small:true})
              )
            )
          )
        )),
        filtered.length===0&&h("div",{style:{textAlign:"center",padding:40,color:"#9CA3AF",fontSize:14}},
          onlyDone?"평가 완료된 과제가 없습니다.":"과제가 없습니다."
        )
      )
    )
  );

  // ── WRITE ──
  if(page==="write") return h("div",{style:{background:"#F9FAFB",minHeight:"100vh",padding:"20px"}},
    toast&&h(Toast,{msg:toast}),
    modal&&modal.type==="leave"&&h(ConfirmModal,{title:"저장되지 않은 내용이 있어요",msg:"저장하지 않고 나가면 변경사항이 사라집니다.",confirmLabel:"나가기",confirmColor:"#EF4444",onConfirm:confirmLeave,onCancel:()=>setModal(null)}),
    h("div",{style:{maxWidth:768,margin:"0 auto",display:"flex",flexDirection:"column",gap:20}},
      h("div",{style:{display:"flex",alignItems:"center",gap:12}},
        h("button",{onClick:tryLeave,style:{background:"none",border:"none",cursor:"pointer",fontSize:20,color:D3,padding:0}},"←"),
        h("div",null,
          h("h1",{style:{fontSize:20,fontWeight:700,color:D,margin:0}},isRewrite?"고쳐쓰기":"과제 작성하기"),
          h("p",{style:{fontSize:12,color:"#9CA3AF",margin:"3px 0 0"}},editItem.title)
        )
      ),
      h("div",{style:{background:"#fff",borderRadius:12,padding:16,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}},
        h("div",{style:{display:"flex",gap:5,flexWrap:"wrap",marginBottom:12}},
          [editItem.grade,editItem.subject,editItem.publisher,editItem.hour].map(v=>h("span",{key:v,style:{fontSize:11,background:B,color:D3,padding:"2px 9px",borderRadius:20}},v))
        ),
        h("p",{style:{fontSize:13,fontWeight:600,color:D2,margin:"0 0 10px"}},"글쓰기 촬영"),
        h("div",{style:{display:"flex",gap:12,alignItems:"flex-start"}},
          h("div",{style:{position:"relative",flexShrink:0}},
            h("button",{onClick:()=>setShowCam(v=>!v),style:{width:72,height:72,borderRadius:12,border:"2px dashed #D1D5DB",background:"#F9FAFB",cursor:"pointer",fontSize:26,display:"flex",alignItems:"center",justifyContent:"center"}},"📷"),
            showCam&&h("div",{style:{position:"absolute",top:78,left:0,zIndex:10,background:"#fff",border:"1px solid #E5E7EB",borderRadius:10,boxShadow:"0 4px 16px rgba(0,0,0,0.12)",overflow:"hidden",minWidth:150}},
              h("button",{onClick:()=>{fileRef.current.setAttribute("capture","environment");fileRef.current.click();},style:{display:"block",width:"100%",padding:"12px 16px",background:"none",border:"none",textAlign:"left",fontSize:14,cursor:"pointer",color:D}},"📸 촬영하기"),
              h("div",{style:{height:1,background:B}}),
              h("button",{onClick:()=>{fileRef.current.removeAttribute("capture");fileRef.current.click();},style:{display:"block",width:"100%",padding:"12px 16px",background:"none",border:"none",textAlign:"left",fontSize:14,cursor:"pointer",color:D}},"🖼️ 이미지 선택")
            ),
            h("input",{ref:fileRef,type:"file",accept:"image/*",style:{display:"none"},onChange:e=>handleFile(e.target.files[0])})
          ),
          image
            ?h("div",{style:{position:"relative",width:72,height:72,flexShrink:0}},
                h("div",{style:{width:72,height:72,borderRadius:12,background:"#E8F0FE",border:"2px solid #C7D7FB",display:"flex",alignItems:"center",justifyContent:"center"}},
                  h("svg",{viewBox:"0 0 72 72",style:{width:72,height:72,borderRadius:10}},
                    h("rect",{width:"72",height:"72",fill:"#E8F0FE",rx:"10"}),
                    h("rect",{x:"8",y:"8",width:"56",height:"56",rx:"6",fill:"#C7D7FB"}),
                    h("circle",{cx:"26",cy:"28",r:"7",fill:"#93B4F8"}),
                    h("polygon",{points:"8,64 28,38 42,52 54,36 64,64",fill:"#6B9CF6"})
                  )
                ),
                h("button",{onClick:()=>{setImage(null);setOcrText("");setIsDirty(true);},style:{position:"absolute",top:-6,right:-6,width:20,height:20,borderRadius:"50%",background:"#EF4444",border:"none",color:"#fff",fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}},"✕")
              )
            :h("div",{style:{flex:1,display:"flex",alignItems:"center",justifyContent:"center",height:72,borderRadius:10,background:B}},
                h("span",{style:{fontSize:13,color:"#9CA3AF"}},"이미지를 선택해주세요")
              )
        ),
        (ocrLoading||ocrText)&&h("div",{style:{marginTop:14,borderTop:"1px solid #F3F4F6",paddingTop:14}},
          h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:8}},
            h("p",{style:{fontSize:12,fontWeight:600,color:D3,margin:0}},"✍️ 텍스트 변환 결과"),
            !ocrLoading&&ocrText&&h("span",{style:{fontSize:11,color:"#9CA3AF"}},`${ocrText.length}자`)
          ),
          ocrLoading
            ?h("div",{style:{display:"flex",gap:6,padding:"12px 0"}},
                [0,1,2].map(i=>h("div",{key:i,style:{width:8,height:8,borderRadius:"50%",background:"#3B82F6",animation:"bounce 1s infinite",animationDelay:`${i*0.2}s`}}))
              )
            :h("textarea",{value:ocrText,onChange:e=>{setOcrText(e.target.value);setIsDirty(true);},rows:6,style:{width:"100%",padding:10,borderRadius:8,border:"1.5px solid #E5E7EB",fontSize:13,lineHeight:1.7,color:D2,resize:"vertical",outline:"none",display:"block"}})
        )
      ),
      h("div",{style:{display:"flex",gap:10}},
        isRewrite
          ?h("button",{disabled:!canSubmit,onClick:handleSubmit,style:{flex:1,padding:"14px",borderRadius:12,border:"none",background:canSubmit?"#2563EB":"#E5E7EB",color:canSubmit?"#fff":"#9CA3AF",fontSize:16,fontWeight:700,cursor:canSubmit?"pointer":"not-allowed"}},"고쳐쓰기 제출")
          :h(Fragment,null,
              h("button",{disabled:!canSubmit,onClick:handleSave,style:{flex:1,padding:"14px",borderRadius:12,border:canSubmit?"1.5px solid #2563EB":"1.5px solid #E5E7EB",background:"#fff",color:canSubmit?"#2563EB":"#9CA3AF",fontSize:16,fontWeight:700,cursor:canSubmit?"pointer":"not-allowed"}},"저장하기"),
              h("button",{disabled:!canSubmit,onClick:handleSubmit,style:{flex:1,padding:"14px",borderRadius:12,border:"none",background:canSubmit?"#2563EB":"#E5E7EB",color:canSubmit?"#fff":"#9CA3AF",fontSize:16,fontWeight:700,cursor:canSubmit?"pointer":"not-allowed"}},"제출하기")
            )
      )
    )
  );

  // ── RESULT ──
  return h("div",{style:{background:"#F3F4F6",minHeight:"100vh",padding:"16px"}},
    h("div",{style:{maxWidth:580,margin:"0 auto"}},
      h("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:12}},
        h("button",{onClick:()=>setPage("home"),style:{background:"none",border:"none",cursor:"pointer",fontSize:20,color:D3,padding:0}},"←"),
        h("h2",{style:{fontSize:17,fontWeight:700,color:D,margin:0}},"결과서")
      ),
      showVersionTabs&&h("div",{style:{display:"flex",background:"#fff",borderRadius:12,padding:5,marginBottom:10,gap:5,border:"1px solid #F0F0F0"}},
        [["original","1차 결과서"],["rewrite","고쳐쓰기 결과서"]].map(([key,label])=>
          h("button",{key,onClick:()=>setResultTab(key),style:{flex:1,padding:"10px",borderRadius:8,border:"none",cursor:"pointer",fontSize:14,fontWeight:600,background:resultTab===key?D:"transparent",color:resultTab===key?"#fff":"#9CA3AF"}},label)
        )
      ),
      h(ResultSheet,{item:resultItem}),
      h("button",{onClick:()=>setPage("home"),style:{width:"100%",padding:"14px",borderRadius:12,border:"1px solid #E5E7EB",background:"#fff",color:D2,fontSize:15,fontWeight:600,cursor:"pointer",marginTop:4,display:"block"}},"뒤로가기")
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
